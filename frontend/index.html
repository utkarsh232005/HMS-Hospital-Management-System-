<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MediCore Hospital Management</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <aside class="sidebar">
        <div class="brand">
            <div class="brand-mark">+</div>
            <div>
                <strong>MediCore</strong>
                <span>Hospital System</span>
            </div>
        </div>

        <nav class="nav" aria-label="Primary">
            <span class="nav-section">Main</span>
            <button class="nav-item active" data-page="dashboard" type="button">Dashboard</button>
            <button class="nav-item" data-page="patients" type="button">Patients</button>
            <button class="nav-item" data-page="appointments" type="button">Appointments</button>
            <button class="nav-item" data-page="doctors" type="button">Doctors</button>
            <span class="nav-section">Hospital</span>
            <button class="nav-item" data-page="departments" type="button">Departments</button>
            <button class="nav-item" data-page="pharmacy" type="button">Pharmacy</button>
            <span class="nav-section">Admin</span>
            <button class="nav-item" data-page="reports" type="button">Reports</button>
        </nav>

        <div class="profile">
            <span class="avatar" id="userAvatar">DR</span>
            <div style="flex: 1;">
                <strong id="userFullName">Dr. Rajan</strong>
                <span id="userRole">Administrator</span>
            </div>
            <button class="icon-button" id="logoutButton" type="button" aria-label="Logout" style="min-height: 32px; width: 32px; background: transparent; font-size: 16px; border: 0; cursor: pointer;">
                🚪
            </button>
        </div>
    </aside>

    <main class="shell">
        <div class="mobile-bar">
            <strong>MediCore</strong>
            <div style="display: flex; align-items: center; gap: 8px;">
                <select id="mobileNav" aria-label="Page navigation">
                    <option value="dashboard">Dashboard</option>
                    <option value="patients">Patients</option>
                    <option value="appointments">Appointments</option>
                    <option value="doctors">Doctors</option>
                    <option value="departments">Departments</option>
                    <option value="pharmacy">Pharmacy</option>
                    <option value="reports">Reports</option>
                </select>
                <button class="small-button" id="mobileLogout" type="button" style="min-height: 32px; padding: 4px 8px;">Logout</button>
            </div>
        </div>
        <section id="app" class="page" aria-live="polite"></section>
    </main>

    <dialog id="recordDialog" class="dialog">
        <form id="recordForm" method="dialog">
            <div class="dialog-head">
                <h2 id="dialogTitle"></h2>
                <button class="icon-button" id="closeDialog" type="button" aria-label="Close">x</button>
            </div>
            <div id="formFields" class="form-grid"></div>
            <div class="dialog-actions">
                <button class="secondary" id="cancelDialog" type="button">Cancel</button>
                <button class="primary" type="submit">Save</button>
            </div>
        </form>
    </dialog>

    <div id="loginScreen" class="login-screen" style="display: none;">
        <div class="login-card">
            <div class="login-brand">
                <div class="brand-mark">+</div>
                <h2>MediCore HMS</h2>
            </div>
            <p class="login-subtitle">Access your hospital management dashboard</p>
            <form id="loginForm">
                <div class="field">
                    <label for="loginUsername">Username</label>
                    <input type="text" id="loginUsername" placeholder="Enter username (e.g. admin)" required autocomplete="username">
                </div>
                <div class="field" style="margin-top: 14px;">
                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" placeholder="Enter password (e.g. admin123)" required autocomplete="current-password">
                </div>
                <div id="loginError" class="login-error" style="display: none;"></div>
                <button type="submit" class="primary" style="width: 100%; margin-top: 20px; min-height: 42px;">Sign In</button>
            </form>
        </div>
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script src="./app.js" defer></script>
</body>
</html>
